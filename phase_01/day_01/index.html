<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #container {
            width: 90%;
            margin: auto;
            height: 500px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background-color: aquamarine;

        }

        #container>div {
            height: 150px;
            width: 30%;
            background-color: beige;
            border-radius: 5%;

            display: flex;
            justify-content: center;
            align-items: center;

            box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px,
                rgba(0, 0, 0, 0.3) 0px 30px 60px -30px,
                rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
        }
    </style>
</head>

<body>

    <div id="container">
        <div>I am Div 1</div>
        <div>I am Div 2</div>
        <div>I am Div 3</div>
    </div>

</body>

</html>
